name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prepare
      - name: Check dist is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "dist/ is out of date. Run 'npm run prepare' and commit the result."
            exit 1
          fi
